<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRAVA ANALIZER</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&family=Space+Mono:wght@400;700&display=swap');
        @font-face {
    font-family: 'AVGARDD_2'; /* El nombre que tú quieras darle */
    src: url('AVGARDD_2.ttf') format('truetype'); /* Nombre exacto del archivo */
    font-weight: bold;
    font-style: normal;
}
        :root {
            --magenta: #D32B92;
            --cian: #8ACECE;
            --bg-black: #000000;
            --text-white: #FFFFFF;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-black);
            color: var(--text-white); font-family: 'AVGARDD_2', monospace;
            overflow: hidden;
        }

        /* --- FONDO ANIMADO --- */
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

        /* --- BARRA DE PROGRESO --- */
        #progress-container { position: fixed; top: 0; left: 0; width: 100%; height: 12px; background: #111; border-bottom: 2px solid var(--magenta); z-index: 1000; display: none; }
        #progress-bar { width: 0%; height: 100%; background-color: var(--cian); transition: width 0.5s ease-out; box-shadow: 0 0 15px var(--cian); }

        .screen { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; background: rgba(0,0,0,0.5); transition: opacity 0.8s; }
        .hidden { opacity: 0 !important; pointer-events: none; }

        /* --- CONTENEDOR PRINCIPAL BLANCO --- */
        .grava-header { border-radius: 20px; padding: 60px; background: rgba(255, 255, 255, 0.95); text-align: center; margin-bottom: 20px; box-shadow: 0 0 40px var(--magenta); position: relative; z-index: 101; display: flex; flex-direction: column; align-items: center; max-width: 550px; }

        .main-logo { width: 350px; height: auto; margin-bottom: 15px; filter: drop-shadow(0 0 5px rgba(0,0,0,0.2)); animation: float 4s infinite ease-in-out; }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        
        .input-group { display: flex; flex-direction: column; gap: 15px; width: 100%; }

        /* Estilo para la nueva pregunta inicial */
        .pregunta-inicial { color: var(--bg-black); font-family: 'Outfit'; font-weight: 900; font-size: 1.5rem; margin-bottom: 10px; text-transform: uppercase; }

        input { background: rgba(0,0,0,0.9); border: 2px solid var(--bg-black); color: var(--cian); padding: 18px; font-family: 'AVGARDD_2'; font-size: 1rem; text-align: center; outline: none; border-radius: 10px; }
        input:focus { border-color: var(--magenta); box-shadow: 0 0 15px var(--magenta); }

        .btn-main { background: var(--bg-black); color: var(--text-white); border: none; padding: 20px; font-family: 'Outfit'; font-size: 1.2rem; font-weight: 900; cursor: pointer; text-transform: uppercase; width: 100%; transition: 0.3s; border-radius: 10px; margin-top: 10px; }
        .btn-main:hover { background: var(--magenta); color: #ffffff; letter-spacing: 1px; }

        /* --- MODAL DE PREGUNTAS --- */
        #modal { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; max-width: 700px; background: #000; border: 8px solid var(--cian); padding: 40px; z-index: 200; box-shadow: 0 0 80px rgba(138, 206, 206, 0.3); border-radius: 20px; }
        .option-btn { background: transparent; border: 1px solid #333; color: var(--text-white); width: 100%; text-align: left; padding: 18px; margin: 10px 0; cursor: pointer; font-family: 'AVGARDD_2'; font-size: 0.95rem; transition: 0.2s; border-radius: 10px; }
        .option-btn:hover { border-color: var(--magenta); color: var(--magenta); background: #080808; padding-left: 25px; }

        /* --- RECUADRO DE RESULTADOS --- */
        .result-box { border: 12px solid var(--cian); padding: 50px; background: #000; box-shadow: 20px 20px 0 var(--magenta); text-align: left; max-width: 900px; color: var(--cian); overflow-y: auto; max-height: 85vh; position: relative; z-index: 200; border-radius: 25px; }
        .section-title { font-family: 'Outfit'; font-size: 1.6rem; border-bottom: 2px solid var(--cian); margin-top: 25px; text-transform: uppercase; color: #fff; }
        .research-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 15px; }
        .data-point { font-family: 'AVGARDD_2'; font-size: 0.9rem; color: #ccc; }
        .data-point span { color: var(--cian); text-transform: uppercase; display: block; font-size: 0.7rem; letter-spacing: 1px; margin-bottom: 2px; }
        .data-point b { color: var(--text-white); text-transform: uppercase; display: block; font-size: 1.1rem; margin-bottom: 10px; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div id="progress-container">
        <div id="progress-bar"></div>
    </div>

    <div id="start-screen" class="screen">
        <div class="grava-header">
            <div class="pregunta-inicial">¿Conoces a tu cliente?</div>
            <img src="logo.png" alt="GRAVA LOGO" class="main-logo">
            
            <div class="input-group">
                <input type="text" id="user-brand" placeholder="Nombre">
                <input type="text" id="user-sector" placeholder="Rubro">
                <button class="btn-main" onclick="startInjection()">INICIAR</button>
            </div>
        </div>
    </div>

    <div id="modal" class="hidden">
        <p style="color: var(--cian); font-family: 'Space Mono'; margin: 0;">>> PROCESANDO VARIABLES</p>
        <h2 id="question-text" style="color:var(--text-white); font-family:'Outfit'; font-weight:900; font-size: 2rem; margin: 15px 0 25px 0;"></h2>
        <div id="options-container"></div>
    </div>

    <div id="result-screen" class="screen hidden">
        <div class="result-box">
            <h1 style="font-family:'Outfit'; font-weight:900; font-size:3rem; margin:0; letter-spacing:-3px; color: #fff;">TU CLIENTE IDEAL</h1>
            <p style="color:#666; font-family:'Space Mono'; margin:0;">MARCA: <span id="out-brand"></span> // SECTOR: <span id="out-sector"></span></p>
            
            <div class="section-title">Perfil Psicológico</div>
            <div class="research-grid">
                <div class="data-point"><span>Arquetipo</span> <b id="r-name"></b></div>
                <div class="data-point"><span>Lema</span> <b id="r-lema"></b></div>
                <div class="data-point"><span>Comportamiento</span> <b id="r-behavior"></b></div>
                <div class="data-point"><span>Miedo Primario</span> <b id="r-miedo"></b></div>
            </div>

            <div class="section-title">Estrategia</div>
            <div class="research-grid">
                <div class="data-point"><span>Sensibilidad</span> <b id="r-loyalty"></b></div>
                <div class="data-point"><span>Cómo venderle</span> <b id="r-sale" style="color:var(--magenta)"></b></div>
            </div>

            <br>
            <button class="btn-main" onclick="location.reload()">NUEVA SESIÓN</button>
        </div>
    </div>

    <script>
        /* --- MOTOR DE FONDO (NO EDITAR) --- */
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let shapes = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();
        class Shape {
            constructor() { this.reset(); }
            reset() { this.x = Math.random() * canvas.width; this.y = -100; this.size = Math.random() * 40 + 20; this.speed = Math.random() * 2 + 1; this.rotation = Math.random() * Math.PI * 2; this.rotSpeed = (Math.random() - 0.5) * 0.02; this.type = Math.floor(Math.random() * 3); }
            update() { this.y += this.speed; this.rotation += this.rotSpeed; if (this.y > canvas.height + 100) this.reset(); }
            draw() { ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.rotation); ctx.strokeStyle = Math.random() > 0.5 ? '#D32B92' : '#8ACECE'; ctx.lineWidth = 1; ctx.beginPath(); if (this.type === 0) ctx.strokeRect(-this.size/2, -this.size/2, this.size, this.size); else if (this.type === 1) { ctx.moveTo(0, -this.size); ctx.lineTo(this.size/2, 0); ctx.lineTo(0, this.size); ctx.lineTo(-this.size/2, 0); ctx.closePath(); } else { ctx.moveTo(0, -this.size); ctx.lineTo(this.size, this.size); ctx.lineTo(-this.size, this.size); ctx.closePath(); } ctx.stroke(); ctx.restore(); }
        }
        for(let i=0; i<30; i++) shapes.push(new Shape());
        function animate() { ctx.fillStyle = 'rgba(0,0,0,0.15)'; ctx.fillRect(0,0,canvas.width, canvas.height); shapes.forEach(s => { s.update(); s.draw(); }); requestAnimationFrame(animate); }
        animate();

        /* --- LÓGICA DE PREGUNTAS --- */
        let currentStep = 0;
        let responses = [];

        const researchQuestions = [
            { q: "¿Por qué compra realmente?", a: ["Precio", "Estética / Estatus", "Utilidad / Solución", "Conexión"] },
            { q: "¿Qué nivel de conocimiento tiene sobre lo que ofreces?", a: ["Básico", "Medio", "Entusiasta", "Experto"] },
            { q: "¿Cómo te encuentra el cliente?", a: ["Lo necesita ahora", "Lo vio y le encantó", "Alguien se lo contó"] },
            { q: "¿Por qué NO elige a los demás?", a: ["Muy caros", "Mala Calidad", "Muy lentos o difíciles", "Son todos iguales"] },
            { q: "¿Qué es lo que más le da miedo al comprarte?", a: ["Perder su plata", "Que no le sirva", "El qué dirán", "Lo difícil que es usarlo"] },
        ];

        function updateProgressBar() {
            const percentage = (currentStep / researchQuestions.length) * 100;
            document.getElementById('progress-bar').style.width = percentage + '%';
        }

        function startInjection() {
            const b = document.getElementById('user-brand').value;
            const s = document.getElementById('user-sector').value;
            if(!b || !s) return alert("COMPLETE LA IDENTIFICACIÓN");
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('progress-container').style.display = 'block';
            updateProgressBar();
            nextQuestion();
        }

        function nextQuestion() {
            if(currentStep >= researchQuestions.length) return endMission();
            const q = researchQuestions[currentStep];
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('question-text').innerText = q.q;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            q.a.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn'; btn.innerText = opt;
                btn.onclick = () => { responses.push(i); currentStep++; document.getElementById('modal').classList.add('hidden'); updateProgressBar(); setTimeout(nextQuestion, 400); };
                container.appendChild(btn);
            });
        }

        /* --- CEREBRO DE RESULTADOS --- */
        function endMission() {
            updateProgressBar();
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('out-brand').innerText = document.getElementById('user-brand').value.toUpperCase();
            document.getElementById('out-sector').innerText = document.getElementById('user-sector').value.toUpperCase();

            const arquetipos = ["EL CAZADOR DE OFERTAS (Pablo)", "LA EXIGENTE PREMIUM (Maria)", "EL PRÁCTICO APURADO (ANDRÉS)", "LA FANÁTICA CONSCIENTE (SOFÍA)"];
            const lemas = ["'Lo mismo, pero más barato'", "'Lo barato sale caro'", "'No me cuentes cuentos, solo haz que funcione'", "'Compro con propósito'"];
            
            const comportamientos = [
                "Pasa horas comparando precios. No le importa la marca, solo el bolsillo.",
                "Busca exclusividad, materiales de primera y un diseño que nadie más tenga.",
                "Quiere comprar en tres clics y que el producto le solucione la vida hoy.",
                "Investiga quién hizo el producto y si la marca es ética o ecológica."
            ];

            const miedos = [
                "Sentir que pagó un solo peso de más.",
                "Comprar algo que se vea 'común' o corriente.",
                "Perder tiempo o que el producto sea difícil de usar.",
                "Apoyar a una marca que sea 'tóxica' o poco ética."
            ];

            const ventas = [
                "Ofrécele descuentos, cupones y demuestra que eres la opción más económica.",
                "Usa fotos impecables, atención personalizada y habla de calidad superior.",
                "Vende envíos rápidos, garantía de devolución y una web muy fácil.",
                "Cuenta tu historia, muestra quién eres y sé muy transparente."
            ];

            document.getElementById('r-name').innerText = arquetipos[responses[0]];
            document.getElementById('r-lema').innerText = lemas[responses[0]];
            document.getElementById('r-behavior').innerText = comportamientos[responses[0]];
            document.getElementById('r-miedo').innerText = miedos[responses[0]];
            document.getElementById('r-sale').innerText = ventas[responses[0]];

            document.getElementById('r-loyalty').innerText = responses[3] == 3 ? "SENSIBLE A LA IDENTIDAD" : "SENSIBLE AL BENEFICIO";
        }
    </script>
</body>
</html>
