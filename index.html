<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRAVA // FODA SCANNER</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&family=Space+Mono:wght@400;700&display=swap');
        @font-face {
            font-family: 'AVGARDD_2';
            src: url('AVGARDD_2.ttf') format('truetype');
            font-weight: bold;
            font-style: normal;
        }
        :root {
            --magenta: #D32B92;
            --cian: #8ACECE;
            --bg-black: #000000;
            --text-white: #FFFFFF;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-black);
            color: var(--text-white); font-family: 'AVGARDD_2', monospace;
            overflow: hidden;
        }

        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

        #progress-container { position: fixed; top: 0; left: 0; width: 100%; height: 12px; background: #111; border-bottom: 2px solid var(--magenta); z-index: 1000; display: none; }
        #progress-bar { width: 0%; height: 100%; background-color: var(--cian); transition: width 0.5s ease-out; box-shadow: 0 0 15px var(--cian); }

        .screen { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; background: rgba(0,0,0,0.5); transition: opacity 0.8s; }
        .hidden { opacity: 0 !important; pointer-events: none; }

        .grava-header { border-radius: 20px; padding: 60px; background: rgba(255, 255, 255, 0.95); text-align: center; margin-bottom: 20px; box-shadow: 0 0 40px var(--magenta); position: relative; z-index: 101; display: flex; flex-direction: column; align-items: center; max-width: 550px; }
        .main-logo { width: 350px; height: auto; margin-bottom: 15px; filter: drop-shadow(0 0 5px rgba(0,0,0,0.2)); animation: float 4s infinite ease-in-out; }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        
        .pregunta-inicial { color: var(--bg-black); font-family: 'Outfit'; font-weight: 900; font-size: 1.5rem; margin-bottom: 20px; text-transform: uppercase; }

        .selector-tipo { display: flex; flex-direction: column; gap: 15px; width: 100%; }
        .btn-select { background: var(--bg-black); color: var(--text-white); border: none; padding: 25px; font-family: 'AVGARDD_2'; font-size: 1.3rem; font-weight: 900; cursor: pointer; border-radius: 12px; transition: 0.3s; text-transform: uppercase; }
        .btn-select:hover { background: var(--magenta); transform: scale(1.02); }

        #modal { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; max-width: 700px; background: #000; border: 8px solid var(--cian); padding: 40px; z-index: 200; box-shadow: 0 0 80px rgba(138, 206, 206, 0.3); border-radius: 20px; }
        .option-btn { background: transparent; border: 1px solid #333; color: var(--text-white); width: 100%; text-align: left; padding: 18px; margin: 10px 0; cursor: pointer; font-family: 'AVGARDD_2'; font-size: 0.95rem; transition: 0.2s; border-radius: 10px; }
        .option-btn:hover { border-color: var(--magenta); color: var(--magenta); background: #080808; padding-left: 25px; }

        .result-box { border: 12px solid var(--cian); padding: 50px; background: #000; box-shadow: 20px 20px 0 var(--magenta); text-align: left; max-width: 900px; color: var(--cian); overflow-y: auto; max-height: 85vh; position: relative; z-index: 200; border-radius: 25px; }
        .section-title { font-family: 'Outfit'; font-size: 1.6rem; border-bottom: 2px solid var(--cian); margin-top: 25px; text-transform: uppercase; color: #fff; }
        .diag-box { background: var(--cian); color: #000; padding: 25px; font-weight: 900; font-family: 'Outfit'; font-size: 1.5rem; margin-top: 25px; text-transform: uppercase; line-height: 1.1; border-radius: 10px; text-align: center; }
        .advice-box { color: #ccc; font-family: 'Space Mono'; font-size: 1rem; margin-top: 15px; border-left: 4px solid var(--magenta); padding-left: 15px; }
        
        .btn-restart { background: var(--magenta); color: white; border: none; padding: 20px; font-family: 'AVGARDD_2'; width: 100%; border-radius: 10px; cursor: pointer; font-weight: 900; margin-top: 20px; text-transform: uppercase; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div id="progress-container">
        <div id="progress-bar"></div>
    </div>

    <div id="start-screen" class="screen">
        <div class="grava-header">
            <div class="pregunta-inicial">SCANNER FODA</div>
            <img src="logo.png" alt="GRAVA LOGO" class="main-logo">
            <div class="selector-tipo">
                <button class="btn-select" onclick="startWithTipo('SERVICIO')">SERVICIO</button>
                <button class="btn-select" onclick="startWithTipo('PRODUCTO')">PRODUCTO</button>
            </div>
        </div>
    </div>

    <div id="modal" class="hidden">
        <p style="color: var(--cian); font-family: 'Space Mono'; margin: 0;">>> ANALIZANDO VARIABLE</p>
        <h2 id="question-text" style="color:var(--text-white); font-family:'Outfit'; font-weight:900; font-size: 2rem; margin: 15px 0 25px 0;"></h2>
        <div id="options-container"></div>
    </div>

    <div id="result-screen" class="screen hidden">
        <div class="result-box">
            <h1 style="font-family:'Outfit'; font-weight:900; font-size:3rem; margin:0; letter-spacing:-3px; color: #fff;">DIAGNÓSTICO GRAVA</h1>
            <p style="color:#666; font-family:'Space Mono'; margin:0;">RUBRO: <span id="out-sector"></span></p>
            
            <div class="section-title">Resultado del Análisis</div>
            <div id="r-diag" class="diag-box"></div>
            
            <div class="section-title">Enfoque Táctico</div>
            <div id="r-advice" class="advice-box"></div>

            <br>
            <button class="btn-restart" onclick="location.reload()">NUEVO ANÁLISIS</button>
        </div>
    </div>

    <script>
        /* --- MOTOR DE FONDO --- */
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let shapes = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();
        class Shape {
            constructor() { this.reset(); }
            reset() { this.x = Math.random() * canvas.width; this.y = -100; this.size = Math.random() * 40 + 20; this.speed = Math.random() * 2 + 1; this.rotation = Math.random() * Math.PI * 2; this.rotSpeed = (Math.random() - 0.5) * 0.02; this.type = Math.floor(Math.random() * 3); }
            update() { this.y += this.speed; this.rotation += this.rotSpeed; if (this.y > canvas.height + 100) this.reset(); }
            draw() { ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.rotation); ctx.strokeStyle = Math.random() > 0.5 ? '#D32B92' : '#8ACECE'; ctx.lineWidth = 1; ctx.beginPath(); if (this.type === 0) ctx.strokeRect(-this.size/2, -this.size/2, this.size, this.size); else if (this.type === 1) { ctx.moveTo(0, -this.size); ctx.lineTo(this.size/2, 0); ctx.lineTo(0, this.size); ctx.lineTo(-this.size/2, 0); ctx.closePath(); } else { ctx.moveTo(0, -this.size); ctx.lineTo(this.size, this.size); ctx.lineTo(-this.size, this.size); ctx.closePath(); } ctx.stroke(); ctx.restore(); }
        }
        for(let i=0; i<30; i++) shapes.push(new Shape());
        function animate() { ctx.fillStyle = 'rgba(0,0,0,0.15)'; ctx.fillRect(0,0,canvas.width, canvas.height); shapes.forEach(s => { s.update(); s.draw(); }); requestAnimationFrame(animate); }
        animate();

        /* --- LÓGICA DE NEGOCIO --- */
        let selectedTipo = "";
        let currentStep = 0;
        let responses = []; // Aquí guardaremos letras: 'A', 'B' o 'C'

        const fodaQuestions = [
            { q: "FORTALEZAS: ¿En qué eres el número 1?", a: ["Calidad y Diseño (Único y hermoso)", "Precio y Rapidez (Barato o veloz)", "Confianza (Mis clientes me aman)"], v: ['A', 'B', 'C'] },
            { q: "DEBILIDADES: ¿Qué te quita el sueño hoy?", a: ["Plata (Necesito inversión)", "Tiempo (Hago todo solo)", "Difusión (Nadie me conoce)"], v: ['A', 'B', 'C'] },
            { q: "OPORTUNIDADES: ¿Qué ves afuera que te sirve?", a: ["Tendencias (Está de moda)", "Internet (Vender por redes/web)", "Alianzas (Unirme a otros)"], v: ['A', 'B', 'C'] },
            { q: "AMENAZAS: ¿Qué te da miedo del mercado?", a: ["Competencia (Somos muchos)", "Economía (Tus clientes gastan menos)", "Insumos (Precios de materiales)"], v: ['A', 'B', 'C'] }
        ];

        function startWithTipo(tipo) {
            selectedTipo = tipo;
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('progress-container').style.display = 'block';
            updateProgressBar();
            nextQuestion();
        }

        function updateProgressBar() {
            const percentage = (currentStep / fodaQuestions.length) * 100;
            document.getElementById('progress-bar').style.width = percentage + '%';
        }

        function nextQuestion() {
            if(currentStep >= fodaQuestions.length) return endMission();
            const q = fodaQuestions[currentStep];
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('question-text').innerText = q.q;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            q.a.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn'; btn.innerText = opt;
                btn.onclick = () => { 
                    responses.push(q.v[i]); 
                    currentStep++; 
                    document.getElementById('modal').classList.add('hidden'); 
                    updateProgressBar(); 
                    setTimeout(nextQuestion, 400); 
                };
                container.appendChild(btn);
            });
        }

        function endMission() {
            updateProgressBar();
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('out-sector').innerText = selectedTipo;

            // Calcular mayoría
            const counts = { A: 0, B: 0, C: 0 };
            responses.forEach(r => counts[r]++);
            
            let result = 'A';
            if (counts.B > counts[result]) result = 'B';
            if (counts.C > counts[result]) result = 'C';

            const diag = document.getElementById('r-diag');
            const advice = document.getElementById('r-advice');

            if (result === 'A') {
                diag.innerText = "POTENCIAL DE MARCA PREMIUM";
                advice.innerText = "Tu valor es real, pero debe parecerlo. ENFÓCATE EN EL DISEÑO de una identidad visual sofisticada y una experiencia de usuario impecable.";
            } else if (result === 'B') {
                diag.innerText = "NECESIDAD DE ORGANIZACIÓN";
                advice.innerText = "Tu negocio es ágil pero frágil. ENFÓCATE EN EL DISEÑO DE PROCESOS, optimizar tus tiempos y empezar a delegar tareas operativas.";
            } else {
                diag.innerText = "NECESIDAD DE COMUNIDAD";
                advice.innerText = "Tu producto es sólido pero invisible. ENFÓCATE EN CREAR UNA IDENTIDAD UNICA, crea contenido y fortalecer tus redes sociales.";
            }
        }
    </script>
</body>
</html>
